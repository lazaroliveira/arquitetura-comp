<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Hello Kitty</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<header>🐱 Manual de Computadores - Hello Kitty 💖</header>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container justify-content-center">
    <button class="btn btn-outline-light m-2" onclick="showTab('intro')">Introdução</button>
    <button class="btn btn-outline-light m-2" onclick="showTab('video')">Vídeo</button>
    <button class="btn btn-outline-light m-2" onclick="showTab('manual')">Slides</button>
    <button class="btn btn-outline-light m-2" onclick="showTab('texto')">Texto</button>
    <button class="btn btn-outline-light m-2" onclick="showTab('checklist')">Checklist</button>
  </div>
</nav>

<div class="container mt-4">

<div id="intro" class="content active">
  <div class="card p-4 position-relative">
    <img class="kitty-img" src="./img/hello1.png">
    <h2>Introdução</h2>
    <p>Equipe:</p>
    <ul>
      <li>Nome 1</li>
      <li>Nome 2</li>
    </ul>
  </div>
</div>

<div id="video" class="content">
  <div class="card p-4 position-relative">
    <img class="kitty-img" src="./img/hello2.png">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
  </div>
</div>

<div id="manual" class="content">
  <div class="card p-4 position-relative">
    <img class="kitty-img" src="./img/hello3.png">
    <iframe src="SEU_SLIDE_AQUI"></iframe>
  </div>
</div>

<div id="texto" class="content">
  <div class="card p-4 position-relative">
    <img class="kitty-img" src="./img/hello1.png">
    <h4>Manual:</h4>
    <p>Desmontagem, limpeza e montagem...</p>
  </div>
</div>

<div id="checklist" class="content">
  <div class="card p-4 position-relative">
    <img class="kitty-img" src="./img/hello2.png">
    <ul class="list-group">
      <li class="list-group-item"><input type="checkbox"> Desligar PC</li>
      <li class="list-group-item"><input type="checkbox"> Limpar</li>
      <li class="list-group-item"><input type="checkbox"> Montar</li>
    </ul>
  </div>
</div>

</div>

<footer>Arquitetura de Computadores 💖</footer>

<script>
function showTab(tabId){
  document.querySelectorAll('.content').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}
</script>

</body>
</html>
